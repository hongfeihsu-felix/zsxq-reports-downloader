<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>估值模型 — Hermes</title>
<style>
body{background:#0d1117;color:#e6edf3;font-family:'Helvetica Neue','PingFang SC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding:0}
.wrap{max-width:600px;margin:0 auto;padding:40px 24px}
h1{font-size:20px;margin:0 0 4px}
.header-sub{color:#8b949e;font-size:12px;margin-bottom:24px}
a{color:#58a6ff;text-decoration:none}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px}
.card-title{font-size:14px;font-weight:700;color:#58a6ff;border-bottom:1px solid #30363d;padding-bottom:8px;margin:0 0 12px}
.error{background:#3d1f1f;border:1px solid #f85149;border-radius:4px;padding:12px 16px;margin:12px 0;color:#f85149;font-size:13px}
select{width:100%;padding:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:14px;font-family:inherit}
select:focus{border-color:#58a6ff;outline:none}
</style>
</head>
<body><div class="wrap">
<h1>&#127809; 公司估值模型 <span style="font-size:12px;color:#8b949e">V0.1</span></h1>
<div class="header-sub"><a href="/">← Dashboard</a></div>
<div class="error">未找到 <b>{{ company }}</b> 的估值数据。该公司的研究报告可能尚未入库。</div>
<div class="card">
<div class="card-title">&#128269; 选择其他公司</div>
<select onchange="if(this.value) location.href='/valuation?company='+encodeURIComponent(this.value)">
<option value="">— 选择公司 —</option>
{% for c in companies %}
<option value="{{ c }}">{{ c }}</option>
{% endfor %}
</select>
</div>
</div></body></html>
